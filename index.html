<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Awesome LLM Apps · 文件索引</title>
<style>
:root{
  --bg:#0e1116; --panel:#161b22; --panel2:#1c232c; --border:#2a313c;
  --txt:#d6dde6; --muted:#8a93a0; --accent:#4f9dff; --accent2:#7c5cff;
  --hover:#222b36;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#11161d,#0e1116);
  border-bottom:1px solid var(--border);padding:14px 20px}
h1{margin:0 0 4px;font-size:17px;font-weight:600}
.sub{color:var(--muted);font-size:12px;margin-bottom:10px}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
#search{flex:1;min-width:220px;background:var(--panel2);border:1px solid var(--border);
  color:var(--txt);padding:9px 12px;border-radius:8px;font-size:14px;outline:none}
#search:focus{border-color:var(--accent)}
select{background:var(--panel2);border:1px solid var(--border);color:var(--txt);
  padding:9px 10px;border-radius:8px;outline:none}
.stats{color:var(--muted);font-size:12px;white-space:nowrap}
.layout{display:flex;height:calc(100vh - 132px)}
.tree{width:42%;min-width:320px;max-width:560px;overflow:auto;padding:10px 6px 40px 14px;border-right:1px solid var(--border)}
.list{width:58%;overflow:auto;padding:10px 18px 40px}
.node{margin:1px 0}
.row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:6px;cursor:pointer;user-select:none;white-space:nowrap}
.row:hover{background:var(--hover)}
.twist{width:14px;color:var(--muted);font-size:11px;text-align:center;transition:transform .12s}
.twist.open{transform:rotate(90deg)}
.folder{color:#d9c06a}
.file{color:var(--txt)}
.kids{margin-left:16px;border-left:1px solid var(--border);padding-left:4px;display:none}
.kids.open{display:block}
.badge{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);
  border-radius:20px;padding:1px 8px;margin-left:6px}
.extdot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;flex:0 0 auto}
li.res{list-style:none;padding:7px 10px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px}
li.res:hover{background:var(--hover)}
li.res a{color:var(--txt);text-decoration:none;display:flex;justify-content:space-between;gap:12px}
.path{color:var(--muted);font-size:12px;word-break:break-all}
.sz{color:var(--muted);font-size:12px;white-space:nowrap}
.cat-tag{display:inline-block;font-size:11px;color:#cdb3ff;background:rgba(124,92,255,.15);
  border:1px solid rgba(124,92,255,.35);border-radius:20px;padding:1px 8px;margin-left:8px;vertical-align:middle}
.hint{color:var(--muted);font-size:12px;padding:24px;text-align:center}
.empty{color:var(--muted);text-align:center;padding:40px}
.count{color:var(--accent);font-weight:600}
</style>
</head>
<body>
<header>
  <h1>Awesome LLM Apps · 本地文件索引</h1>
  <div class="sub">点击文件可在同域直接打开；支持搜索 / 按分类筛选 / 折叠目录树</div>
  <div class="bar">
    <input id="search" placeholder="搜索文件名或路径…（如 rag_chain、travel_agent.py）" autocomplete="off">
    <select id="cat"><option value="">全部分类</option></select>
    <span class="stats" id="stats"></span>
  </div>
</header>
<div class="layout">
  <div class="tree" id="tree"></div>
  <div class="list" id="list"><div class="hint">在左侧目录树中展开，或在上方搜索；点击文件打开源码。</div></div>
</div>

const EXTCOLOR = {".py": "#4584e0", ".md": "#9b6bdf", ".txt": "#8a8f98", ".ipynb": "#e07b39", ".json": "#c2a23a", ".yaml": "#c2a23a", ".yml": "#c2a23a", ".toml": "#c2a23a", ".html": "#3fa66a", ".css": "#3fa66a", ".js": "#d9b54a", ".ts": "#2f7fd1", ".png": "#e06b9b", ".jpg": "#e06b9b", ".jpeg": "#e06b9b", ".gif": "#e06b9b", ".svg": "#e06b9b", ".pdf": "#d65a5a", ".csv": "#5ab0a0", ".lock": "#777", ".sh": "#6 db66", ".cfg": "#8a8f98", ".ini": "#8a8f98"};
const treeEl = document.getElementById('tree');
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const catEl = document.getElementById('cat');
const statsEl = document.getElementById('stats');

// 构建分类下拉
const catCounts = {};
DATA.files.forEach(f=>{const top=f.path.split('/')[0];catCounts[top]=(catCounts[top]||0)+1;});
Object.keys(DATA.catCn).forEach(c=>{
  if(catCounts[c]){const o=document.createElement('option');o.value=c;o.textContent=DATA.catCn[c]+` (${catCounts[c]})`;catEl.appendChild(o);}
});
const uncat = DATA.files.filter(f=>!DATA.catCn[f.path.split('/')[0]]).length;
if(uncat){const o=document.createElement('option');o.value='__other';o.textContent='其他 ('+uncat+')';catEl.appendChild(o);}

statsEl.innerHTML = `共 <span class="count">${DATA.files.length}</span> 个文件 · <span class="count">${Object.keys(catCounts).length}</span> 个顶层分类`;

function dot(ext){const c=EXTCOLOR[ext]||'#8a8f98';return `<span class="extdot" style="background:${c}"></span>`;}

function catOf(path){const t=path.split('/')[0];return DATA.catCn[t]||null;}

// 渲染树
function buildNode(node, topCat){
  const wrap=document.createElement('div');wrap.className='node';
  const row=document.createElement('div');row.className='row';
  if(node.isFile){
    const f=node;
    row.innerHTML=`<span class="twist"></span>${dot(f.ext||'')}<span class="file">${f.name}</span>`;
    row.title=f.path;
    row.onclick=()=>openFile(f.path);
  }else{
    const isTop = node.name.indexOf('/')===-1 && DATA.catCn[node.name];
    const tag = isTop?`<span class="cat-tag">${DATA.catCn[node.name]}</span>`:'';
    row.innerHTML=`<span class="twist open">▸</span><span class="folder">📁 ${node.name}</span>${tag}`;
    const kids=document.createElement('div');kids.className='kids open';
    node.children.forEach(ch=>kids.appendChild(buildNode(ch, isTop?node.name:topCat)));
    row.querySelector('.twist').onclick=(e)=>{e.stopPropagation();kids.classList.toggle('open');row.querySelector('.twist').classList.toggle('open');};
    row.onclick=()=>{kids.classList.toggle('open');row.querySelector('.twist').classList.toggle('open');};
    wrap.appendChild(row);wrap.appendChild(kids);return wrap;
  }
  wrap.appendChild(row);return wrap;
}
// 顶层节点（不渲染根 awesome-llm-apps 本身，直接渲染其子目录）
DATA.tree.children.forEach(ch=>treeEl.appendChild(buildNode(ch)));

function openFile(path){
  const url='./'+path.split('/').map(encodeURIComponent).join('/');
  listEl.innerHTML=`<div class="hint">正在打开：<a href="${url}" target="_blank" style="color:var(--accent)">${path}</a></div>`;
  window.open(url,'_blank');
}

// 搜索与筛选
let timer=null;
function runFilter(){
  const q=searchEl.value.trim().toLowerCase();
  const cat=catEl.value;
  let res=DATA.files;
  if(cat){
    res=res.filter(f=>{const t=f.path.split('/')[0];return cat==='__other'?!DATA.catCn[t]:t===cat;});
  }
  if(q){
    res=res.filter(f=>f.path.toLowerCase().includes(q)||f.name.toLowerCase().includes(q));
  }
  renderList(res, q);
}
function renderList(res, q){
  if(!res.length){listEl.innerHTML='<div class="empty">没有匹配的文件</div>';return;}
  const ul=document.createElement('ul');ul.style.padding='0';ul.style.margin='0';
  res.slice(0,600).forEach(f=>{
    const li=document.createElement('li');li.className='res';
    const cat=catOf(f.path);
    const catHtml=cat?`<span class="cat-tag">${cat}</span>`:'';
    const sz=f.size>=0?fmtSize(f.size):'';
    li.innerHTML=`<a href="./${f.path.split('/').map(encodeURIComponent).join('/')}" target="_blank">
      <span>${dot(f.ext)}${f.name}${catHtml}<br><span class="path">${f.path}</span></span>
      <span class="sz">${sz}</span></a>`;
    ul.appendChild(li);
  });
  let note=`<div class="hint">匹配 <span class="count">${res.length}</span> 个文件`+(res.length>600?`（仅显示前 600，请输入更精确的关键词）`:'')+`</div>`;
  listEl.innerHTML=note;listEl.appendChild(ul);
}
function fmtSize(n){if(n<1024)return n+' B';if(n<1048576)return (n/1024).toFixed(1)+' KB';return (n/1048576).toFixed(1)+' MB';}

searchEl.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(runFilter,120);});
catEl.addEventListener('change',runFilter);
renderList(DATA.files,'');
</script>
